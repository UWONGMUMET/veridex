services:
  database:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - type: bind
        source: ./infra/postgres/001-init.sql
        target: /docker-entrypoint-initdb.d/001-init.sql
        read_only: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  ai:
    build:
      context: ./ai
    environment:
      NODE_ENV: "${NODE_ENV}"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}"
      STORAGE_ROOT: "/storage"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS}"
      CHUNK_SIZE: "${CHUNK_SIZE}"
      CHUNK_OVERLAP: "${CHUNK_OVERLAP}"
      HF_HOME: "/models/huggingface"
    ports:
      - "${AI_PORT}:${AI_PORT}"
    volumes:
      - ./ai/app:/app/app
      - ./storage:/storage
      - model_cache:/models
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:${AI_PORT}/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    command:
      - uvicorn
      - app.main:app
      - --host
      - "${AI_HOST}"
      - --port
      - "${AI_PORT}"
      - --reload

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: "${NODE_ENV}"
      BACKEND_HOST: "${BACKEND_HOST}"
      BACKEND_PORT: "${BACKEND_PORT}"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}"
      AI_SERVICE_URL: "http://ai:${AI_PORT}"
      STORAGE_ROOT: "/storage"
      MAX_FILE_SIZE_BYTES: "${MAX_FILE_SIZE_BYTES}"
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend/src:/app/src
      - ./backend/drizzle:/app/drizzle
      - ./storage:/storage
    depends_on:
      database:
        condition: service_healthy
      ai:
        condition: service_healthy
    command:
      - sh
      - -c
      - bun run db:migrate && bun run dev

volumes:
  postgres_data:
  model_cache: